site_name: 確率・確率分布・確率的最適化 — 段階的学習
site_description: 確率を「何を不確実量とし、どの確率表現と最適化形式を選ぶか」を説明できるようになるための段階的教材。電力・エネルギー応用つき。
site_author: lec_prob
docs_dir: .
use_directory_urls: true

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ

plugins:
  - same-dir
  - search:
      lang: ja

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

exclude_docs: |
  .venv/
  site/
  logs/
  IMPROVEMENT_PROPOSAL.md
  notebooks/
  __pycache__/
  *.pyc
  scripts/_style.py
  scripts/README.md
  apps/*/SPEC.md
  requirements*.txt
  .github/

nav:
  - ホーム: README.md
  - 🧭 確率の使い方（実践ガイド）: notes/how_to_use_probability.md
  - ▶ ブラウザで動かす: interactive/index.md
  - ロードマップ:
      - 学習地図: roadmap/learning_map.md
      - 概念地図: roadmap/concept_map.md
      - 最適化地図: roadmap/optimization_map.md
      - 記法規約: roadmap/notation.md
  - ノート（本文）:
      - 0 なぜ確率が必要か: notes/00_why_probability.md
      - 1 事象と確率: notes/01_events_and_probability.md
      - 2 確率変数と分布: notes/02_random_variables_and_distributions.md
      - 3 期待値・分散・相関: notes/03_expectation_variance_covariance.md
      - 4 データから分布へ: notes/04_from_data_to_distribution.md
      - 5 シナリオとモンテカルロ: notes/05_scenarios_and_monte_carlo.md
      - 6 不確実性下の最適化: notes/06_optimization_under_uncertainty.md
      - 6b 二段階確率計画（発展）: notes/06b_two_stage_stochastic_programming.md
  - 演習:
      - 構成・使い方: exercises/README.md
      - 初級:
          - Module 0: exercises/basic/00_why_probability.md
          - Module 1: exercises/basic/01_events_and_probability.md
          - Module 2: exercises/basic/02_random_variables_and_distributions.md
          - Module 3: exercises/basic/03_expectation_variance_covariance.md
          - Module 4: exercises/basic/04_from_data_to_distribution.md
          - Module 5: exercises/basic/05_scenarios_and_monte_carlo.md
          - Module 6: exercises/basic/06_optimization_under_uncertainty.md
          - Module 6b: exercises/basic/06b_two_stage_stochastic_programming.md
      - 中級:
          - Module 0: exercises/intermediate/00_why_probability.md
          - Module 1: exercises/intermediate/01_events_and_probability.md
          - Module 2: exercises/intermediate/02_random_variables_and_distributions.md
          - Module 3: exercises/intermediate/03_expectation_variance_covariance.md
          - Module 4: exercises/intermediate/04_from_data_to_distribution.md
          - Module 5: exercises/intermediate/05_scenarios_and_monte_carlo.md
          - Module 6: exercises/intermediate/06_optimization_under_uncertainty.md
          - Module 6b: exercises/intermediate/06b_two_stage_stochastic_programming.md
      - 発展:
          - Module 0: exercises/advanced/00_why_probability.md
          - Module 1: exercises/advanced/01_events_and_probability.md
          - Module 2: exercises/advanced/02_random_variables_and_distributions.md
          - Module 3: exercises/advanced/03_expectation_variance_covariance.md
          - Module 4: exercises/advanced/04_from_data_to_distribution.md
          - Module 5: exercises/advanced/05_scenarios_and_monte_carlo.md
          - Module 6: exercises/advanced/06_optimization_under_uncertainty.md
          - Module 6b: exercises/advanced/06b_two_stage_stochastic_programming.md
      - 解答:
          - Module 0: exercises/solutions/00_why_probability_solutions.md
          - Module 1: exercises/solutions/01_events_and_probability_solutions.md
          - Module 2: exercises/solutions/02_random_variables_and_distributions_solutions.md
          - Module 3: exercises/solutions/03_expectation_variance_covariance_solutions.md
          - Module 4: exercises/solutions/04_from_data_to_distribution_solutions.md
          - Module 5: exercises/solutions/05_scenarios_and_monte_carlo_solutions.md
          - Module 6: exercises/solutions/06_optimization_under_uncertainty_solutions.md
          - Module 6b: exercises/solutions/06b_two_stage_solutions.md
  - ツール（ローカル実行）:
      - PDF・CDF・区間確率: apps/pdf_cdf_visualizer/README.md
      - ベイズ更新: apps/bayes_visualizer/README.md
      - モンテカルロ収束: apps/monte_carlo_visualizer/README.md
      - シナリオ木: apps/scenario_tree_visualizer/README.md
      - 蓄電池運用: apps/battery_dispatch/README.md
      - 6形式コンパレータ: apps/stochastic_optimization_comparator/README.md
  - 文献:
      - 読書ガイド: references/reading_list.md
  - 開発ログ: development_log.md
