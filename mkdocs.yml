site_name: 確率・確率分布・確率的最適化 — 触って学ぶ
site_description: 公式暗記でなく「不確実性を何で表し、何を大事にして決めるか」を、図と触って動くツールで学ぶ確率的最適化の入門教材（電力・エネルギー応用）。インストール不要。
site_author: lec_prob
site_url: https://lutelute.github.io/lec_prob/
docs_dir: .
use_directory_urls: true

theme:
  name: material
  language: ja
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - toc.follow
    - search.suggest
  # ブループリント（紙の設計図）デザイン：紙地×インクのライト単一
  palette:
    scheme: default
  font:
    text: Noto Sans JP
    code: JetBrains Mono

plugins:
  - same-dir
  - search:
      lang: ja

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_css:
  - interactive/lib/blueprint.css
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

exclude_docs: |
  /README.md
  .venv/
  site/
  logs/
  IMPROVEMENT_PROPOSAL.md
  notebooks/
  __pycache__/
  *.pyc
  scripts/_style.py
  scripts/README.md
  apps/*/SPEC.md
  requirements*.txt
  .github/

nav:
  - ホーム: index.md
  - はじめに:
      - 確率の使い方: notes/how_to_use_probability.md
      - 分布をどう数値で扱うか: notes/distributions_and_methods.md
  - ▶ ブラウザで動かす: interactive/index.md
  - 教科書:
      - 第0章 なぜ確率が必要か: notes/00_why_probability.md
      - 第1章 事象と確率: notes/01_events_and_probability.md
      - 第2章 確率変数と分布: notes/02_random_variables_and_distributions.md
      - 第3章 期待値・分散・相関: notes/03_expectation_variance_covariance.md
      - 第4章 データから分布へ: notes/04_from_data_to_distribution.md
      - 第5章 シナリオとモンテカルロ: notes/05_scenarios_and_monte_carlo.md
      - 第6章 不確実性下の最適化: notes/06_optimization_under_uncertainty.md
      - 第6b章 二段階確率計画（発展）: notes/06b_two_stage_stochastic_programming.md
      - 第7章 ケーススタディ（実データ→決定）: notes/07_case_study.md
  - 演習:
      - 構成・使い方: exercises/README.md
      - 初級:
          - 第0章: exercises/basic/00_why_probability.md
          - 第1章: exercises/basic/01_events_and_probability.md
          - 第2章: exercises/basic/02_random_variables_and_distributions.md
          - 第3章: exercises/basic/03_expectation_variance_covariance.md
          - 第4章: exercises/basic/04_from_data_to_distribution.md
          - 第5章: exercises/basic/05_scenarios_and_monte_carlo.md
          - 第6章: exercises/basic/06_optimization_under_uncertainty.md
          - 第6b章: exercises/basic/06b_two_stage_stochastic_programming.md
      - 中級:
          - 第0章: exercises/intermediate/00_why_probability.md
          - 第1章: exercises/intermediate/01_events_and_probability.md
          - 第2章: exercises/intermediate/02_random_variables_and_distributions.md
          - 第3章: exercises/intermediate/03_expectation_variance_covariance.md
          - 第4章: exercises/intermediate/04_from_data_to_distribution.md
          - 第5章: exercises/intermediate/05_scenarios_and_monte_carlo.md
          - 第6章: exercises/intermediate/06_optimization_under_uncertainty.md
          - 第6b章: exercises/intermediate/06b_two_stage_stochastic_programming.md
      - 発展:
          - 第0章: exercises/advanced/00_why_probability.md
          - 第1章: exercises/advanced/01_events_and_probability.md
          - 第2章: exercises/advanced/02_random_variables_and_distributions.md
          - 第3章: exercises/advanced/03_expectation_variance_covariance.md
          - 第4章: exercises/advanced/04_from_data_to_distribution.md
          - 第5章: exercises/advanced/05_scenarios_and_monte_carlo.md
          - 第6章: exercises/advanced/06_optimization_under_uncertainty.md
          - 第6b章: exercises/advanced/06b_two_stage_stochastic_programming.md
      - 解答:
