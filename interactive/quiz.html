<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>理解度チェック（触って学ぶ）</title>
<link rel="stylesheet" href="lib/tool.css">
<style>
  .q{font-size:1.05rem;font-weight:700;margin:8px 0 14px}
  .opt{display:block;width:100%;text-align:left;padding:12px 16px;margin:8px 0;border:1.5px solid #dadce0;
    border-radius:10px;background:#fff;cursor:pointer;font-size:.98rem;transition:.12s}
  .opt:hover{border-color:#4285f4;background:#f6f9ff}
  .opt.correct{border-color:#34a853;background:#e6f4ea}
  .opt.wrong{border-color:#ea4335;background:#fce8e6}
  .opt:disabled{cursor:default}
  .exp{margin:10px 0;padding:12px 14px;border-left:.3rem solid #4285f4;background:#f1f5ff;border-radius:6px;font-size:.92rem;display:none}
  .exp.show{display:block}
  .bar{height:8px;background:#eef0f3;border-radius:99px;overflow:hidden;margin:4px 0 16px}
  .bar>div{height:100%;background:#4285f4;width:0;transition:width .25s}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
  .btn{border:0;background:#4285f4;color:#fff;font-weight:700;padding:11px 22px;border-radius:10px;cursor:pointer;font-size:1rem}
  .btn:disabled{background:#c3ccd6;cursor:default}
  .score{font-size:2.2rem;font-weight:800;color:#1a56c4}
</style>
</head>
<body>
<div class="wrap">
  <h1>理解度チェック：触って確かめる8問</h1>
  <p class="sub">概念が身についたか、選んで確かめましょう。各問、選ぶと正誤と解説が出ます。間違えても大丈夫——どこを復習すればよいか分かります。</p>
  <div class="bar"><div id="prog"></div></div>
  <div id="card">
    <div class="q" id="qtext"></div>
    <div id="opts"></div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <span id="count" style="color:#5f6368"></span>
      <button class="btn" id="next" disabled>次へ →</button>
    </div>
  </div>
  <div id="result" style="display:none;text-align:center;padding:20px 0">
    <div class="score" id="scoretext"></div>
    <div id="advice" style="margin:14px 0"></div>
    <button class="btn" id="again">もう一度</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const Q=[
 {q:'連続な確率変数で密度 f(x)=2.0 だった。これは「その点の確率が2.0」という意味？',
  o:['はい、確率が2.0','いいえ。密度は確率ではなく、確率は区間の面積（CDFの差）','確率は必ず0なので無意味'],a:1,
  e:'密度は確率ではない。連続では確率＝区間の面積＝CDFの差で、密度は1を超えてよい。（Module 2）'},
 {q:'感度99%・誤陽性1%の検査。有病率は0.1%。陽性のとき本当に病気の確率は？',
  o:['約99%','約9%','約50%'],a:1,
  e:'基準率の誤謬。事前0.1%が効き、事後≈0.099/(0.099+0.999)≈9%。稀な事象では「陽性≠本物」。（Module 1）'},
 {q:'「供給不足の確率を5%以下に抑えたい」。どの最適化形式が素直？',
  o:['期待値最小化','チャンス制約','決定論'],a:1,
  e:'違反確率を ε 以下に＝チャンス制約。ε分位点に効く。（Module 6）'},
 {q:'不足コストが余剰コストよりずっと大きい。需要の「平均ぴったり」を確保するのは最適？',
  o:['最適（平均が一番）','最適でない。平均より多めが正解','少なめが正解'],a:1,
  e:'結果が非対称なら平均は最適でない（平均の罠）。最適は臨界比 c_s/(c_s+c_o) の分位点。（Module 0・6）'},
 {q:'モンテカルロ推定の誤差は、標本数 N でどう縮む？',
  o:['1/N','1/√N','1/N²'],a:1,
  e:'標準誤差は σ/√N。精度を2倍にするには標本4倍、希少事象の評価は特に遅い。（Module 5）'},
 {q:'「測定の誤差」と「需要の本質的なばらつき」。情報を増やすと減るのはどちら？',
  o:['両方減る','測定の誤差だけ（認識論的）','ばらつきだけ'],a:1,
  e:'認識論的（誤差）は情報で減る。偶然的（ばらつき）は減らない。この区別が形式選択を分ける。（Module 0）'},
 {q:'CVaR（95%）は何を測る？',
  o:['95%点の損失（それはVaR）','最悪5%の「平均」損失','平均損失'],a:1,
  e:'VaRは分位点、CVaRはその先（裾）の条件付き平均。大損の重さを測り、凸で扱いやすい。（Module 6）'},
 {q:'EVPI（完全情報の価値）が大きいとは、どういう状況？',
  o:['不確実性が決定にあまり効かない','先に未来が分かれば大きく得する＝知らないことの代償が高い','確率モデルは要らない'],a:1,
  e:'EVPI = 確率計画(SP) − 完全情報(WS)。大きいほど「いま知らないこと」のコストが高い。（Module 6b）'},
];
let i=0, score=0, answered=false, curCorrect=0;
function render(){
  const x=Q[i];
  $('qtext').textContent=`Q${i+1}. ${x.q}`;
  $('count').textContent=`${i+1} / ${Q.length}　正解 ${score}`;
  $('prog').style.width=`${i/Q.length*100}%`;
  $('exp').className='exp'; $('exp').textContent='';
  $('next').disabled=true; answered=false;
  // 選択肢をシャッフル（正解が常に同じ位置になるのを防ぐ）
  const order=x.o.map((_,k)=>k);
  for(let j=order.length-1;j>0;j--){ const r=Math.floor(Math.random()*(j+1)); [order[j],order[r]]=[order[r],order[j]]; }
  curCorrect=order.indexOf(x.a);
  const ob=$('opts'); ob.innerHTML='';
  order.forEach((origK,pos)=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=x.o[origK];
    b.onclick=()=>choose(pos,b); ob.appendChild(b);
  });
}
function choose(k,btn){
  if(answered) return; answered=true;
  const x=Q[i];
  const opts=[...document.querySelectorAll('.opt')];
  opts.forEach((b,j)=>{ b.disabled=true; if(j===curCorrect)b.classList.add('correct'); });
  if(k===curCorrect){ score++; } else { btn.classList.add('wrong'); }
  $('exp').textContent=(k===curCorrect?'◎ 正解！ ':'✗ おしい。 ')+x.e;
  $('exp').className='exp show';
  $('count').textContent=`${i+1} / ${Q.length}　正解 ${score}`;
  $('next').disabled=false;
}
$('next').onclick=()=>{
  if(i<Q.length-1){ i++; render(); }
  else{ // 結果
    $('card').style.display='none'; $('prog').style.width='100%';
    $('result').style.display='block';
    $('scoretext').textContent=`${score} / ${Q.length} 正解`;
    const adv = score>=7 ? 'みごと。「不確実性をどう表し、何を大事にして決めるか」が身についています。'
      : score>=4 ? 'いい線です。間違えた問の Module を復習すると一段深まります。'
      : 'ここからが本番。<a href="../notes/how_to_use_probability/" target="_top">🧭 確率の使い方</a> と各ノートの「30秒まとめ」から戻りましょう。';
    $('advice').innerHTML=adv;
  }
};
$('again').onclick=()=>{ i=0; score=0; $('result').style.display='none'; $('card').style.display='block'; render(); };
render();
</script>
</body>
</html>
