<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>学習コース — 順番に触って学ぶ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#3457d5;--ink:#202124;--muted:#5f6368;--line:#e0e0e0;--green:#34a853;--soft:#f6f8ff}
  *{box-sizing:border-box}
  body{font-family:'Noto Sans JP','Hiragino Sans',system-ui,sans-serif;color:var(--ink);margin:0;background:#fff;line-height:1.7}
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 60px}
  h1{font-size:1.4rem;margin:.2em 0}
  .lead{color:var(--muted);font-size:.95rem;margin:.3em 0 1em}
  .bar{height:10px;background:#eef0f3;border-radius:99px;overflow:hidden;margin:6px 0}
  .bar>div{height:100%;background:var(--green);width:0;transition:width .3s}
  .prog{font-size:.85rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .prog a{color:var(--blue);cursor:pointer;font-size:.82rem}
  ol.steps{list-style:none;padding:0;margin:16px 0;counter-reset:s}
  .step{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:10px 0;
    text-decoration:none;color:inherit;transition:.12s;background:#fff}
  .step:hover{border-color:var(--blue);box-shadow:0 3px 12px rgba(52,87,213,.12);transform:translateY(-1px)}
  .mark{flex:0 0 30px;height:30px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-weight:700;color:var(--muted);counter-increment:s;font-size:.9rem}
  .mark::before{content:counter(s)}
  .step.done .mark{background:var(--green);border-color:var(--green);color:#fff}
  .step.done .mark::before{content:"✓"}
  .step.next{border-color:var(--blue);background:var(--soft)}
  .body{flex:1}
  .title{font-weight:700}
  .title .tag{font-size:.7rem;font-weight:700;color:#fff;background:var(--blue);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  .title .tag.tool{background:var(--green)}
  .desc{color:var(--muted);font-size:.86rem;margin-top:2px}
  .nextpill{font-size:.72rem;color:var(--blue);font-weight:700;margin-top:3px}
  .foot{color:var(--muted);font-size:.85rem;margin-top:18px;border-top:1px solid var(--line);padding-top:12px}
  .foot a{color:var(--blue)}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎓 学習コース — 順番に触って学ぶ</h1>
  <p class="lead">上から順に。<b>読む→触る→自分の問題で使う→確かめる</b>の一本道（約40分）。開いた項目は <b>✓</b> が付き、<b>次にやること</b>が青く光ります。進捗はこのブラウザに保存。</p>
  <div class="bar"><div id="progbar"></div></div>
  <div class="prog"><span id="progtext"></span><a id="reset">進捗をリセット</a></div>
  <ol class="steps" id="steps"></ol>
  <p class="foot">全体を俯瞰したいとき → <a href="map.html">🗺 全体地図</a> / <a href="blueprint.html">📐 ブループリント</a>。体系的な本文は <a href="../notes/00_why_probability/">Module 0〜</a>。</p>
</div>
<script>
const STEPS=[
 {id:'guide',t:'確率の使い方',tag:'ガイド',d:'3ステップ（名付ける→表す→決める）で全体観をつかむ。',h:'../notes/how_to_use_probability/'},
 {id:'dnm',t:'分布を数値でどう扱うか',tag:'核心',d:'事象→分布→手法。地図に操作を当てて数を取り出す（触れるツール内蔵）。',h:'../notes/distributions_and_methods/'},
 {id:'pdf',t:'PDF・CDF を触る',tag:'TOOL',tool:1,d:'密度≠確率。確率は「区間の面積」だと体感する。',h:'pdf_cdf.html'},
 {id:'mc',t:'モンテカルロを触る',tag:'TOOL',tool:1,d:'標本で近似、誤差は 1/√N。シナリオ法の正体。',h:'montecarlo.html'},
 {id:'cmp',t:'6形式コンパレータ',tag:'TOOL',tool:1,d:'同じ問題でも「何を大事にするか」で決定 x* が100〜137と動く。',h:'comparator.html'},
 {id:'calc',t:'決定計算機（自分のデータで）',tag:'TOOL',tool:1,d:'自分の需要・コストを入れて、実際の確保量を6形式で出す。CSVで持ち出し。',h:'calculator.html'},
 {id:'quiz',t:'理解度チェック',tag:'TOOL',tool:1,d:'8問で確かめる。間違えた所が復習の入口。',h:'quiz.html'},
];
let done=new Set(); try{done=new Set(JSON.parse(localStorage.getItem('lp_course')||'[]'));}catch(e){}
function save(){try{localStorage.setItem('lp_course',JSON.stringify([...done]));}catch(e){}}
function render(){
  const nextIdx=STEPS.findIndex(s=>!done.has(s.id));
  document.getElementById('steps').innerHTML=STEPS.map((s,i)=>{
    const isDone=done.has(s.id), isNext=(i===nextIdx);
    return `<a class="step${isDone?' done':''}${isNext?' next':''}" href="${s.h}" data-id="${s.id}" target="_top">
      <div class="mark"></div>
      <div class="body"><div class="title">${s.t}<span class="tag${s.tool?' tool':''}">${s.tag}</span></div>
      <div class="desc">${s.d}</div>${isNext?'<div class="nextpill">▶ 次はこれ</div>':''}</div></a>`;
  }).join('');
  document.querySelectorAll('.step').forEach(a=>a.addEventListener('click',()=>{done.add(a.dataset.id);save();}));
  const n=STEPS.filter(s=>done.has(s.id)).length;
  document.getElementById('progbar').style.width=(n/STEPS.length*100)+'%';
  document.getElementById('progtext').textContent=`${n} / ${STEPS.length} 完了`+(n===STEPS.length?' 🎉 全部やりました！':'');
}
document.getElementById('reset').onclick=()=>{ if(confirm('学習の進捗をリセットしますか？')){done.clear();save();render();} };
render();
</script>
</body>
</html>
