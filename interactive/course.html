<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>学習コース — 順番に触って学ぶ</title>
<link rel="stylesheet" href="lib/blueprint.css">
<style>
  *{box-sizing:border-box}
  body{font-family:var(--jp);color:var(--ink);margin:0;background:var(--paper);line-height:1.7;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 60px}
  header{border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:14px}
  h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.04em}
  header .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:5px;letter-spacing:.14em}
  .lead{font-size:13px;color:var(--ink-2);margin:12px 0 16px;line-height:1.8}
  .bar{height:8px;background:var(--card);border:1px solid var(--ink);overflow:hidden;margin:6px 0}
  .bar>div{height:100%;background:var(--spbd);width:0;transition:width .3s}
  .prog{font-family:var(--mono);font-size:11px;color:var(--ink-3);display:flex;justify-content:space-between;align-items:center;letter-spacing:.04em}
  .prog a{color:var(--ev);cursor:pointer;text-decoration:none}
  .prog a:hover{text-decoration:underline}
  ol.steps{list-style:none;padding:0;margin:16px 0;counter-reset:s}
  .step{display:flex;gap:14px;align-items:flex-start;border:1px solid var(--ink);padding:13px 15px;margin:10px 0;
    text-decoration:none;color:inherit;transition:.12s;background:var(--card)}
  .step:hover{box-shadow:3px 3px 0 var(--line);transform:translate(-1px,-1px)}
  .mark{flex:0 0 26px;height:26px;border:1px solid var(--ink-3);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:700;color:var(--ink-3);counter-increment:s;font-size:12px;background:var(--card)}
  .mark::before{content:counter(s,decimal-leading-zero)}
  .step.done .mark{background:var(--spbg);border-color:var(--spbd);color:var(--sp)}
  .step.done .mark::before{content:"✓"}
  .step.next{border-width:2px;background:#fff}
  .body{flex:1}
  .title{font-weight:700;font-size:.95rem}
  .title .tag{margin-left:8px;vertical-align:1px}
  .desc{color:var(--ink-2);font-size:.84rem;margin-top:3px}
  .nextpill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ev);font-weight:700;margin-top:5px}
  .foot{font-family:var(--mono);color:var(--ink-3);font-size:11px;margin-top:20px;border-top:1px solid var(--line);padding-top:12px;line-height:1.9}
  .foot a{color:var(--ev);text-decoration:none}
  .foot a:hover{text-decoration:underline}
  footer.fig{margin-top:26px;font-family:var(--mono);font-size:10px;color:var(--ink-3);display:flex;justify-content:space-between;letter-spacing:.08em;border-top:1px solid var(--line);padding-top:10px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>学習コース — 順番に触って学ぶ</h1>
    <div class="sub">COURSE · READ → TOUCH → APPLY → CHECK · 約40分</div>
  </header>
  <p class="lead">上から順に。<b>読む→触る→自分の問題で使う→確かめる</b>の一本道。開いた項目は <b>✓</b> が付き、<b>次にやること</b>が太枠になります。進捗はこのブラウザに保存。</p>
  <div class="bar"><div id="progbar"></div></div>
  <div class="prog"><span id="progtext"></span><a id="reset">進捗をリセット</a></div>
  <ol class="steps" id="steps"></ol>
  <p class="foot">確率的最適化を俯瞰したいとき → <a href="map.html">手法マップ</a> · <a href="blueprint.html">全体ブループリント</a><br>体系的な本文は <a href="../notes/00_why_probability/">第0章〜</a></p>
  <footer class="fig"><div>確率的最適化 · 学習コース</div><div>COURSE · 7 STEPS</div></footer>
</div>
<script>
const STEPS=[
 {id:'guide',t:'確率の使い方',tag:'ガイド',cls:'t-me',d:'3ステップ（名付ける→表す→決める）で全体観をつかむ。',h:'../notes/how_to_use_probability/'},
 {id:'dnm',t:'分布を数値でどう扱うか',tag:'核心',cls:'t-ev',d:'事象→分布→手法。地図に操作を当てて数を取り出す（触れるツール内蔵）。',h:'../notes/distributions_and_methods/'},
 {id:'pdf',t:'PDF・CDF を触る',tag:'TOOL',cls:'t-to',tool:1,d:'密度≠確率。確率は「区間の面積」だと体感する。',h:'pdf_cdf.html'},
 {id:'mc',t:'モンテカルロを触る',tag:'TOOL',cls:'t-to',tool:1,d:'標本で近似、誤差は 1/√N。シナリオ法の正体。',h:'montecarlo.html'},
 {id:'anat',t:'6形式の解剖（数式×図）',tag:'TOOL',cls:'t-to',tool:1,d:'数式の項に触れると図の対応する場所が光る。形式の意味を数式から掴む。',h:'anatomy.html'},
 {id:'cmp',t:'6形式コンパレータ',tag:'TOOL',cls:'t-to',tool:1,d:'同じ問題でも「何を大事にするか」で決定 x* が100〜137と動く。',h:'comparator.html'},
 {id:'calc',t:'決定計算機（自分のデータで）',tag:'TOOL',cls:'t-to',tool:1,d:'自分の需要・コストを入れて、実際の確保量を6形式で出す。CSVで持ち出し。',h:'calculator.html'},
 {id:'quiz',t:'理解度チェック',tag:'TOOL',cls:'t-to',tool:1,d:'10問で確かめる。間違えた所が復習の入口。',h:'quiz.html'},
];
let done=new Set(); try{done=new Set(JSON.parse(localStorage.getItem('lp_course')||'[]'));}catch(e){}
function save(){try{localStorage.setItem('lp_course',JSON.stringify([...done]));}catch(e){}}
function render(){
  const nextIdx=STEPS.findIndex(s=>!done.has(s.id));
  document.getElementById('steps').innerHTML=STEPS.map((s,i)=>{
    const isDone=done.has(s.id), isNext=(i===nextIdx);
    return `<a class="step${isDone?' done':''}${isNext?' next':''}" href="${s.h}" data-id="${s.id}" target="_top">
      <div class="mark"></div>
      <div class="body"><div class="title">${s.t}<span class="tag ${s.cls}">${s.tag}</span></div>
      <div class="desc">${s.d}</div>${isNext?'<div class="nextpill">▶ NEXT · 次はこれ</div>':''}</div></a>`;
  }).join('');
  document.querySelectorAll('.step').forEach(a=>a.addEventListener('click',()=>{done.add(a.dataset.id);save();}));
  const n=STEPS.filter(s=>done.has(s.id)).length;
  document.getElementById('progbar').style.width=(n/STEPS.length*100)+'%';
  document.getElementById('progtext').textContent=`${n} / ${STEPS.length} 完了`+(n===STEPS.length?' 🎉 全部やりました！':'');
}
document.getElementById('reset').onclick=()=>{ if(confirm('学習の進捗をリセットしますか？')){done.clear();save();render();} };
render();
</script>
</body>
</html>
