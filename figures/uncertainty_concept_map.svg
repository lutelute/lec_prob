<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 486" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect width="480" height="486" fill="#ffffff"/>

  <text x="240" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#202124">不確実さ の 3つの顔</text>

  <!-- 事象 -->
  <rect x="20" y="44" width="440" height="62" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="40" y="72" font-size="18" font-weight="700" fill="#1a56c4">事象</text>
  <text x="110" y="72" font-size="15" fill="#3c4043">故障・停電（起こる/起こらない）</text>
  <text x="110" y="94" font-size="14.5" font-weight="600" fill="#1a56c4">→ P(A)・信頼性で表す</text>

  <!-- ばらつき -->
  <rect x="20" y="116" width="440" height="62" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="40" y="144" font-size="18" font-weight="700" fill="#137333">ばらつき</text>
  <text x="140" y="144" font-size="15" fill="#3c4043">需要・PV・天候（量が揺れる）</text>
  <text x="140" y="166" font-size="14.5" font-weight="600" fill="#137333">→ 確率分布で表す</text>

  <!-- 誤差 -->
  <rect x="20" y="188" width="440" height="62" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="40" y="216" font-size="18" font-weight="700" fill="#c5221f">誤差</text>
  <text x="110" y="216" font-size="15" fill="#3c4043">測定・推定・予報（知らない＝減る）</text>
  <text x="110" y="238" font-size="14.5" font-weight="600" fill="#c5221f">→ 区間・ベイズ・集合で表す</text>

  <!-- 矢印 -->
  <line x1="240" y1="252" x2="240" y2="290" stroke="#5f6368" stroke-width="2" marker-end="url(#arr)"/>
  <text x="256" y="276" font-size="13" fill="#5f6368">確率で「表す」</text>

  <!-- 価値判断 -->
  <rect x="40" y="296" width="400" height="64" rx="12" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="240" y="324" text-anchor="middle" font-size="16" font-weight="700" fill="#b06000">何を大事にするか（価値判断）</text>
  <text x="240" y="348" text-anchor="middle" font-size="14" fill="#3c4043">平均で得る ・ 最悪を避ける ・ 失敗の確率 ・ 大損</text>

  <!-- 矢印 -->
  <line x1="240" y1="360" x2="240" y2="400" stroke="#5f6368" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 決定 -->
  <rect x="150" y="408" width="180" height="58" rx="12" fill="#4285f4"/>
  <text x="240" y="434" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">決定</text>
  <text x="240" y="455" text-anchor="middle" font-size="12" fill="#e8f0fe">＋ 受け入れるリスク</text>
</svg>
